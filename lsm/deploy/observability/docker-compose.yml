# Observability stack for the LSM key-value store.
#
# Layout:
#   The LSM process runs on the host, exposing OTEL/Prometheus metrics at
#     http://localhost:9090/metrics (see NewMeterProvider + promhttp.Handler
#     wired in src/lsm/lsm.go when Open(..., recordMetric=true)).
#
#   Prometheus runs in a container and scrapes that host endpoint via
#     host.docker.internal:9090. The extra_hosts line below makes
#     host.docker.internal resolve on plain Linux Docker too (Docker
#     Desktop / OrbStack already handle this).
#
#   Grafana runs in a container, points at http://prometheus:9090 over the
#     compose network, and is pre-provisioned with a Prometheus datasource
#     and the LSM latency-and-throughput dashboard.
#
# Ports (host-side):
#   19090  Prometheus UI      (mapped away from 9090 to avoid clashing with
#                              the LSM's /metrics endpoint, which also
#                              binds :9090 on the host)
#   13000  Grafana UI
#
# Bring up:   docker compose -f deploy/observability/docker-compose.yml up -d
# Tear down:  docker compose -f deploy/observability/docker-compose.yml down
# Wipe data:  docker compose ... down -v   (removes prom_data + grafana_data)

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: lsm-prometheus
    restart: unless-stopped
    ports:
      # host:container — LSM /metrics owns host:9090, so we expose
      # Prometheus at host:19090 while it still runs on 9090 inside the
      # container network.
      - "19090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"        # POST /-/reload for hot config reload
      - "--storage.tsdb.retention.time=24h"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: lsm-grafana
    restart: unless-stopped
    ports:
      # 13000 avoids common collisions (3000 is Next.js dev, etc.).
      # Change if you prefer the conventional Grafana URL.
      - "13000:3000"
    environment:
      # admin/admin on first login, then forced to change.
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      # Anonymous read-only access so you can share the dashboard link
      # without making viewers log in. Disable if ever exposed beyond
      # localhost.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_USERS_DEFAULT_THEME: dark
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prom_data:
  grafana_data:
