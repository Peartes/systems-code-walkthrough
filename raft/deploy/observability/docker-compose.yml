# Observability stack for the Raft cluster.
#
# Layout:
#   Raft nodes run on the host machine on ports 18700/18701/18702
#     (each exposing /metrics via promhttp on its `metrics_addr` from
#      config.json).
#   Prometheus runs in a container and scrapes those host endpoints via
#     `host.docker.internal` — works on Docker Desktop / OrbStack out of
#     the box, and the `extra_hosts: host-gateway` line below makes it
#     work on plain Linux Docker too.
#   Grafana runs in a container, points at `http://prometheus:9090` over
#     the compose network, and is pre-provisioned with the datasource and
#     a Raft cluster dashboard.
#
# Bring up:   docker compose -f deploy/observability/docker-compose.yml up -d
# Tear down:  docker compose -f deploy/observability/docker-compose.yml down
# Wipe data:  docker compose ... down -v   (removes prom_data + grafana_data)

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: raft-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # File-based service discovery: the dashboard's /api/seed handler
      # writes ./prometheus/targets/raft.json with the current peer
      # metrics endpoints, and Prometheus picks up changes via the
      # file_sd refresh_interval — no static target cap, no reload.
      - ./prometheus/targets:/etc/prometheus/targets:ro
      - prom_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"        # POST /-/reload for hot config reload
      - "--storage.tsdb.retention.time=24h"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: raft-grafana
    restart: unless-stopped
    ports:
      # 13000 chosen to avoid common collisions on dev machines (port
      # 3000 is taken by Next.js, 3001 by another local server). Change
      # this if you prefer the more conventional Grafana URL.
      - "13000:3000"
    environment:
      # admin/admin on first login, then forced to change.
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      # Anonymous read-only access so you can show the dashboard to a
      # colleague without making them log in. Disable if this is ever
      # exposed beyond localhost.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_USERS_DEFAULT_THEME: dark
      # Don't pull plugins on container start — keeps the first boot fast
      # and offline-friendly.
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prom_data:
  grafana_data:
