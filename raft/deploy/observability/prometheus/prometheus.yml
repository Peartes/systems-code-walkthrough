# Prometheus scrape config for the Raft demo cluster.
#
# Targets come from `targets/raft.json`, written by the dashboard
# backend's /api/seed handler whenever the cluster is reseeded. This
# avoids any static cap on cluster size — Prometheus picks up changes
# within `refresh_interval` seconds, no reload required.
#
# A 3-second scrape interval keeps the dashboard responsive during
# elections and partitions, which can resolve in well under a second.

global:
  scrape_interval: 3s
  evaluation_interval: 15s
  external_labels:
    cluster: raft-demo

scrape_configs:
  - job_name: raft-nodes
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/*.json
        refresh_interval: 5s
