# Tells Grafana to load any dashboard JSON found under
# /var/lib/grafana/dashboards (mounted from ./grafana/dashboards in
# docker-compose.yml).
apiVersion: 1

providers:
  - name: raft
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 10
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
